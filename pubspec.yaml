name: mokr
description: >-
  Realistic mock data and images for Flutter UI development.
  Stable users, posts, feeds, and images.
  For development and prototyping only.
version: 0.1.0
repository: https://github.com/MNBLabs/mokr
issue_tracker: https://github.com/MNBLabs/mokr/issues
topics:
  - mock
  - ui
  - fake-data
  - prototyping
  - testing

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'
dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.0
  http: ^1.0.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
